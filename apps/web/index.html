<!DOCTYPE html>
<html lang="ko">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F4F6EE" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="습관 정원" />
    <title>습관 정원</title>
    <meta name="description" content="매일의 작은 습관이 모여 꽃을 피웁니다." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="습관 정원" />
    <meta property="og:title" content="습관 정원" />
    <meta property="og:description" content="매일의 작은 습관이 모여 꽃을 피웁니다." />
    <meta property="og:url" content="https://jonathanblackdoctor.github.io/habit-garden/" />
    <meta property="og:image" content="https://jonathanblackdoctor.github.io/habit-garden/og-card.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="전설과 초월 식물이 자라는 습관 정원" />
    <meta property="og:locale" content="ko_KR" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="습관 정원" />
    <meta name="twitter:description" content="매일의 작은 습관이 모여 꽃을 피웁니다." />
    <meta name="twitter:image" content="https://jonathanblackdoctor.github.io/habit-garden/og-card.png" />
    <script>
      // beforeinstallprompt가 React 마운트 전에 발화될 수 있어 전역에 캡처해둔다.
      window.__deferredInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();
        window.__deferredInstallPrompt = e;
        window.dispatchEvent(new CustomEvent('pwa-install-available'));
      });
      window.addEventListener('appinstalled', function () {
        window.__deferredInstallPrompt = null;
        window.dispatchEvent(new CustomEvent('pwa-installed'));
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
